name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
        
    - name: Lint Frontend
      run: |
        cd frontend
        npm ci
        npm run lint

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: docker build -t crave-backend ./backend
      
    - name: Build Frontend Docker Image
      run: docker build -t crave-frontend ./frontend

    - name: Build Recommender Docker Image
      run: docker build -t crave-recommender -f ./recommender/Dockerfile .

    - name: Verify Docker Compose Build
      run: docker compose build
